<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zoldyck Estate — Assassination Contract Board</title>
  <meta name="description" content="Hunter x Hunter strategy simulator. Manage assassination contracts, plan routes, and maximize gold as a Zoldyck operative."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-left">
      <div class="logo">
        <span class="logo-z">Z</span>
        <span class="logo-text">OLDYCK ESTATE</span>
      </div>
      <span class="header-sub">Assassination Contract Board — Classified</span>
    </div>
    <div class="header-right">
      <div class="hud-day">Day <span id="hud-day-val">1</span> / 200</div>
      <div class="hud-gold">⬡ <span id="hud-gold-val">0</span>g</div>
      <div class="hud-rep">⚜ <span id="hud-rep-val">100</span></div>
    </div>
  </header>

  <!-- CONTROLS BAR -->
  <div class="controls-bar">
    <button class="btn btn-gold" id="btn-run">▶ Run Simulation</button>
    <button class="btn btn-outline" id="btn-reset">↺ New Game</button>
    <button class="btn btn-outline" id="btn-save">💾 Save</button>
    <div class="speed-wrap">
      <label class="speed-label">Speed</label>
      <input type="range" id="speed-control" min="5" max="200" value="40" step="5"/>
      <span id="speed-val">40x</span>
    </div>
  </div>

  <!-- NAV -->
  <nav class="main-nav">
    <button class="nav-btn active" data-section="dashboard">🏠 Dashboard</button>
    <button class="nav-btn" data-section="contracts">📋 Contract Board</button>
    <button class="nav-btn" data-section="map">🗺 World Map</button>
    <button class="nav-btn" data-section="timeline">📜 Timeline</button>
    <button class="nav-btn" data-section="analytics">📊 Analytics</button>
  </nav>

  <!-- MAIN -->
  <main class="main-content">

    <!-- DASHBOARD -->
    <section class="section active" id="section-dashboard">
      <div id="dashboard"></div>
    </section>

    <!-- CONTRACT BOARD -->
    <section class="section" id="section-contracts">
      <div id="contract-board"></div>
    </section>

    <!-- MAP -->
    <section class="section" id="section-map">
      <div id="map-view"></div>
    </section>

    <!-- TIMELINE -->
    <section class="section" id="section-timeline">
      <h2 class="section-title">📜 Mission Timeline</h2>
      <div id="timeline" class="timeline-wrap"></div>
    </section>

    <!-- ANALYTICS -->
    <section class="section" id="section-analytics">
      <h2 class="section-title">📊 Analytics</h2>
      <div class="analytics-grid">
        <div class="chart-card wide">
          <h3 class="chart-title">⬡ Gold Earned Over Time</h3>
          <canvas id="gold-chart"></canvas>
        </div>
        <div class="chart-card">
          <h3 class="chart-title">⚡ Skill Radar</h3>
          <canvas id="skill-chart"></canvas>
        </div>
        <div class="chart-card">
          <h3 class="chart-title">◎ Contract Status</h3>
          <canvas id="pie-chart"></canvas>
        </div>
        <div class="chart-card wide">
          <h3 class="chart-title">⚜ Reputation Over Time</h3>
          <canvas id="rep-chart"></canvas>
        </div>
      </div>
    </section>

  </main>

  <!-- FINAL REPORT OVERLAY -->
  <div id="final-report" style="display:none;"></div>

  <!-- TOAST CONTAINER -->
  <div id="toast-container"></div>

  <!-- AMBIENT PARTICLES -->
  <div class="particles" aria-hidden="true">
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
